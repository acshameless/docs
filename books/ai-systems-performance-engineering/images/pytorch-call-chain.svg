<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
  <defs>
    <linearGradient id="gFw" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="gPy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="gCu" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="gDr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4"/><stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="gHw" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect width="880" height="540" rx="16" fill="#0F172A"/>

  <text x="300" y="40" text-anchor="middle" fill="#F1F5F9" font-size="17" font-weight="700">PyTorch &#x2192; GPU Call Chain</text>
  <text x="300" y="60" text-anchor="middle" fill="#64748B" font-size="12">torch.matmul(A, B) full execution path through the stack</text>

  <!-- Layer 5: Framework -->
  <rect x="40" y="84" width="520" height="74" rx="10" fill="url(#gFw)" filter="url(#sh)"/>
  <text x="56" y="112" fill="#FFF" font-size="14" font-weight="700">AI Frameworks</text>
  <text x="56" y="132" fill="rgba(255,255,255,0.82)" font-size="11.5">PyTorch &#x2014; TorchDynamo &#x2192; AOT Autograd &#x2192; TorchInductor / Triton</text>
  <text x="56" y="148" fill="rgba(255,255,255,0.55)" font-size="10.5">User code: model(x), torch.matmul(), loss.backward()</text>

  <!-- Layer 4: Python CUDA -->
  <rect x="40" y="172" width="520" height="74" rx="10" fill="url(#gPy)" filter="url(#sh)"/>
  <text x="56" y="200" fill="#FFF" font-size="14" font-weight="700">Python CUDA Libraries</text>
  <text x="56" y="220" fill="rgba(255,255,255,0.82)" font-size="11.5">cuTile &#xB7; cuPyNumeric &#xB7; CuPy &#xB7; Warp &#xB7; Triton &#xB7; CUTLASS (C++)</text>
  <text x="56" y="236" fill="rgba(255,255,255,0.55)" font-size="10.5">Kernel authoring &amp; domain acceleration</text>

  <!-- Layer 3: CUDA Toolkit -->
  <rect x="40" y="260" width="520" height="74" rx="10" fill="url(#gCu)" filter="url(#sh)"/>
  <text x="56" y="288" fill="#FFF" font-size="14" font-weight="700">CUDA Toolkit &amp; Runtime</text>
  <text x="56" y="308" fill="rgba(255,255,255,0.82)" font-size="11.5">nvcc &#xB7; cudart &#xB7; cuBLAS &#xB7; cuDNN &#xB7; NCCL &#xB7; PTX / SASS</text>
  <text x="56" y="324" fill="rgba(255,255,255,0.55)" font-size="10.5">Compiler, runtime, optimized math libs; fatbinary for forward/backward compat</text>

  <!-- Layer 2: Driver -->
  <rect x="40" y="348" width="520" height="74" rx="10" fill="url(#gDr)" filter="url(#sh)"/>
  <text x="56" y="376" fill="#FFF" font-size="14" font-weight="700">GPU Driver</text>
  <text x="56" y="396" fill="rgba(255,255,255,0.82)" font-size="11.5">nvidia-smi &#xB7; /dev/nvidia* &#xB7; Memory alloc &#xB7; Task scheduling &#xB7; Multi-tenant</text>
  <text x="56" y="412" fill="rgba(255,255,255,0.55)" font-size="10.5">Kernel module managing GPU hardware; persistence mode eliminates cold start</text>

  <!-- Layer 1: Hardware -->
  <rect x="40" y="436" width="520" height="74" rx="10" fill="url(#gHw)" filter="url(#sh)"/>
  <text x="56" y="464" fill="#FFF" font-size="14" font-weight="700">GPU Hardware</text>
  <text x="56" y="484" fill="rgba(255,255,255,0.82)" font-size="11.5">H100 &#xB7; B200 &#xB7; GB200 &#x2014; SMs &#xB7; Tensor Cores &#xB7; HBM &#xB7; NVLink</text>
  <text x="56" y="500" fill="rgba(255,255,255,0.55)" font-size="10.5">Compute endpoint: kernels execute in parallel on streaming multiprocessors</text>

  <!-- ===== RIGHT: Call Flow ===== -->
  <rect x="596" y="84" width="248" height="426" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="720" y="106" text-anchor="middle" fill="#CBD5E1" font-size="12" font-weight="700" letter-spacing="1.2">CALL FLOW</text>

  <!-- Step 1 -->
  <rect x="620" y="120" width="200" height="38" rx="7" fill="rgba(245,158,11,0.15)" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="720" y="144" text-anchor="middle" fill="#FCD34D" font-size="12.5" font-weight="600">torch.matmul(A, B)</text>

  <line x1="720" y1="158" x2="720" y2="186" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="752" y="177" fill="#64748B" font-size="10">delegate</text>

  <!-- Step 2 -->
  <rect x="620" y="190" width="200" height="38" rx="7" fill="rgba(139,92,246,0.15)" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="720" y="214" text-anchor="middle" fill="#C4B5FD" font-size="12.5" font-weight="600">cuBLAS GEMM kernel</text>

  <line x1="720" y1="228" x2="720" y2="256" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="752" y="247" fill="#64748B" font-size="10">invoke</text>

  <!-- Step 3 -->
  <rect x="620" y="260" width="200" height="38" rx="7" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="720" y="284" text-anchor="middle" fill="#93C5FD" font-size="12.5" font-weight="600">CUDA Runtime (cudart)</text>

  <line x1="720" y1="298" x2="720" y2="326" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="752" y="317" fill="#64748B" font-size="10">ioctl</text>

  <!-- Step 4 -->
  <rect x="620" y="330" width="200" height="38" rx="7" fill="rgba(6,182,212,0.15)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="720" y="354" text-anchor="middle" fill="#67E8F9" font-size="12.5" font-weight="600">GPU Driver dispatch</text>

  <line x1="720" y1="368" x2="720" y2="396" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="752" y="387" fill="#64748B" font-size="10">schedule</text>

  <!-- Step 5 -->
  <rect x="620" y="400" width="200" height="38" rx="7" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="1.5"/>
  <text x="720" y="424" text-anchor="middle" fill="#6EE7B7" font-size="12.5" font-weight="600">GPU Kernel execution</text>

  <!-- Bottom annotation -->
  <line x1="630" y1="456" x2="810" y2="456" stroke="rgba(248,113,113,0.3)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="720" y="476" text-anchor="middle" fill="#F87171" font-size="11.5" font-weight="600">Every layer can bottleneck</text>
  <text x="720" y="496" text-anchor="middle" fill="#64748B" font-size="10.5">Ch.3 goal: eliminate system-level stalls</text>

  <!-- Connecting lines -->
  <line x1="560" y1="121" x2="620" y2="139" stroke="rgba(245,158,11,0.25)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="560" y1="209" x2="620" y2="209" stroke="rgba(139,92,246,0.25)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="560" y1="297" x2="620" y2="279" stroke="rgba(59,130,246,0.25)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="560" y1="385" x2="620" y2="349" stroke="rgba(6,182,212,0.25)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="560" y1="473" x2="620" y2="419" stroke="rgba(16,185,129,0.25)" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
