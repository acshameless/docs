<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 800">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .n0 { fill: #F0FAF0; stroke: #A7D8A7; stroke-width: 1.5; stroke-dasharray: 8 5; }
      .n1 { fill: #EBF5FF; stroke: #90CAF9; stroke-width: 1.5; stroke-dasharray: 8 5; }
      .bx { fill: #FFF; stroke: #D0D5DD; stroke-width: 1.2; }
      .bxd { fill: #F2F4F7; stroke: #D0D5DD; stroke-width: 1.2; }
      .gg { fill: #16A34A; stroke: #15803D; stroke-width: 1.5; }
      .gb { fill: #2563EB; stroke: #1D4ED8; stroke-width: 1.5; }
      .tr { stroke: #D0D5DD; stroke-width: 1.5; fill: none; }
      .c-pix { stroke: #0284C7; stroke-width: 3; fill: none; stroke-linecap: round; }
      .c-pxb { stroke: #EA580C; stroke-width: 3; fill: none; stroke-linecap: round; stroke-dasharray: 8 5; }
      .c-node { stroke: #0D9488; stroke-width: 3; fill: none; stroke-linecap: round; stroke-dasharray: 5 3; }
      .c-phb { stroke: #7C3AED; stroke-width: 3; fill: none; stroke-linecap: round; stroke-dasharray: 7 4; }
      .c-sys { stroke: #DC2626; stroke-width: 3; fill: none; stroke-linecap: round; stroke-dasharray: 10 6; }
      .c-nv { stroke: #16A34A; stroke-width: 4; fill: none; stroke-linecap: round; }
      .ft { font: 700 22px Inter,-apple-system,system-ui,sans-serif; fill: #101828; }
      .fs { font: 600 15px Inter,-apple-system,system-ui,sans-serif; fill: #344054; }
      .fl { font: 600 13px Inter,-apple-system,system-ui,sans-serif; fill: #344054; }
      .fm { font: 500 11px Inter,-apple-system,system-ui,sans-serif; fill: #667085; }
      .fg { font: 700 14px Inter,-apple-system,system-ui,sans-serif; fill: #FFF; }
      .fgs { font: 500 10px Inter,-apple-system,system-ui,sans-serif; fill: rgba(255,255,255,.8); }
      .fp { font: 700 11px Inter,-apple-system,system-ui,sans-serif; fill: #FFF; }
      .fleg { font: 500 12px Inter,-apple-system,system-ui,sans-serif; fill: #344054; }
      .flegs { font: 400 11px Inter,-apple-system,system-ui,sans-serif; fill: #667085; }
    </style>
  </defs>

  <rect class="bg" width="1500" height="800"/>
  <text class="ft" x="750" y="36" text-anchor="middle">PCIe / NVLink Topology Overview</text>
  <line x1="40" y1="52" x2="1460" y2="52" stroke="#EAECF0" stroke-width="1"/>

  <!-- ======================== STRUCTURE ======================== -->

  <!-- NUMA 0 panel -->
  <rect class="n0" x="40" y="72" width="720" height="570" rx="16"/>
  <text class="fs" x="400" y="100" text-anchor="middle">NUMA Node 0</text>

  <!-- NUMA 1 panel -->
  <rect class="n1" x="820" y="72" width="640" height="570" rx="16"/>
  <text class="fs" x="1140" y="100" text-anchor="middle">NUMA Node 1</text>

  <!-- CPU 0 -->
  <rect class="bx" x="260" y="118" width="280" height="42" rx="8"/>
  <text class="fl" x="400" y="144" text-anchor="middle">CPU 0</text>

  <!-- HB A (left) -->
  <rect class="bxd" x="100" y="206" width="220" height="36" rx="7"/>
  <text class="fl" x="210" y="229" text-anchor="middle">Host Bridge A</text>

  <!-- HB B (right) -->
  <rect class="bxd" x="480" y="206" width="220" height="36" rx="7"/>
  <text class="fl" x="590" y="229" text-anchor="middle">Host Bridge B</text>

  <!-- CPU -> HBs -->
  <polyline class="tr" points="340,160 340,180 210,180 210,206"/>
  <polyline class="tr" points="460,160 460,180 590,180 590,206"/>

  <!-- HB interconnect -->
  <line class="tr" x1="320" y1="224" x2="480" y2="224" stroke-dasharray="4 3"/>

  <!-- Switch A -->
  <rect class="bx" x="70" y="296" width="160" height="30" rx="6"/>
  <text class="fm" x="150" y="316" text-anchor="middle">Switch A</text>
  <line class="tr" x1="150" y1="242" x2="150" y2="296"/>

  <!-- Switch B -->
  <rect class="bx" x="270" y="296" width="160" height="30" rx="6"/>
  <text class="fm" x="350" y="316" text-anchor="middle">Switch B</text>
  <line class="tr" x1="270" y1="242" x2="350" y2="296"/>

  <!-- Switch C -->
  <rect class="bx" x="510" y="296" width="160" height="30" rx="6"/>
  <text class="fm" x="590" y="316" text-anchor="middle">Switch C</text>
  <line class="tr" x1="590" y1="242" x2="590" y2="296"/>

  <!-- GPU 0 -->
  <rect class="gg" x="60" y="388" width="100" height="56" rx="10"/>
  <text class="fg" x="110" y="413" text-anchor="middle">GPU 0</text>
  <text class="fgs" x="110" y="431" text-anchor="middle">Node 0</text>
  <line class="tr" x1="110" y1="326" x2="110" y2="388"/>

  <!-- GPU 1 -->
  <rect class="gg" x="190" y="388" width="100" height="56" rx="10"/>
  <text class="fg" x="240" y="413" text-anchor="middle">GPU 1</text>
  <text class="fgs" x="240" y="431" text-anchor="middle">Node 0</text>
  <line class="tr" x1="190" y1="326" x2="240" y2="388"/>

  <!-- GPU 2 -->
  <rect class="gg" x="300" y="388" width="100" height="56" rx="10"/>
  <text class="fg" x="350" y="413" text-anchor="middle">GPU 2</text>
  <text class="fgs" x="350" y="431" text-anchor="middle">Node 0</text>
  <line class="tr" x1="350" y1="326" x2="350" y2="388"/>

  <!-- GPU 3 -->
  <rect class="gg" x="540" y="388" width="100" height="56" rx="10"/>
  <text class="fg" x="590" y="413" text-anchor="middle">GPU 3</text>
  <text class="fgs" x="590" y="431" text-anchor="middle">Node 0</text>
  <line class="tr" x1="590" y1="326" x2="590" y2="388"/>

  <!-- CPU 1 -->
  <rect class="bx" x="1000" y="118" width="280" height="42" rx="8"/>
  <text class="fl" x="1140" y="144" text-anchor="middle">CPU 1</text>

  <!-- HB Node1 -->
  <rect class="bxd" x="1030" y="206" width="220" height="36" rx="7"/>
  <text class="fl" x="1140" y="229" text-anchor="middle">PCIe Host Bridge</text>
  <line class="tr" x1="1140" y1="160" x2="1140" y2="206"/>

  <!-- Switch D -->
  <rect class="bx" x="1055" y="296" width="170" height="30" rx="6"/>
  <text class="fm" x="1140" y="316" text-anchor="middle">Switch D</text>
  <line class="tr" x1="1140" y1="242" x2="1140" y2="296"/>

  <!-- GPU 4 -->
  <rect class="gb" x="1020" y="388" width="100" height="56" rx="10"/>
  <text class="fg" x="1070" y="413" text-anchor="middle">GPU 4</text>
  <text class="fgs" x="1070" y="431" text-anchor="middle">Node 1</text>
  <line class="tr" x1="1095" y1="326" x2="1070" y2="388"/>

  <!-- GPU 5 -->
  <rect class="gb" x="1170" y="388" width="100" height="56" rx="10"/>
  <text class="fg" x="1220" y="413" text-anchor="middle">GPU 5</text>
  <text class="fgs" x="1220" y="431" text-anchor="middle">Node 1</text>
  <line class="tr" x1="1185" y1="326" x2="1220" y2="388"/>

  <!-- ======================== CONNECTION LINES ======================== -->
  <!-- Each path is broken into node-to-node segments.
       The line touches a node edge, stops, then resumes from the next edge. -->

  <!-- PIX: GPU0 -> Switch A -> GPU1 -->
  <line class="c-pix" x1="110" y1="388" x2="118" y2="326"/>
  <line class="c-pix" x1="182" y1="326" x2="240" y2="388"/>
  <rect x="127" y="334" width="46" height="20" rx="10" fill="#0284C7"/>
  <text class="fp" x="150" y="348" text-anchor="middle">PIX</text>

  <!-- PIX Node1: GPU4 -> Switch D -> GPU5 -->
  <line class="c-pix" x1="1070" y1="388" x2="1092" y2="326"/>
  <line class="c-pix" x1="1188" y1="326" x2="1220" y2="388"/>

  <!-- PXB: GPU1 -> Switch A -> Switch B -> GPU2 -->
  <line class="c-pxb" x1="240" y1="388" x2="198" y2="326"/>
  <line class="c-pxb" x1="230" y1="308" x2="270" y2="308"/>
  <line class="c-pxb" x1="350" y1="326" x2="350" y2="388"/>
  <rect x="288" y="294" width="44" height="18" rx="9" fill="#EA580C"/>
  <text class="fp" x="310" y="307" text-anchor="middle">PXB</text>

  <!-- NODE: GPU2 -> Switch B -> Host Bridge A -> Host Bridge B -> Switch C -> GPU3 -->
  <line class="c-node" x1="360" y1="388" x2="360" y2="326"/>
  <line class="c-node" x1="350" y1="296" x2="320" y2="242"/>
  <line class="c-node" x1="320" y1="224" x2="480" y2="224"/>
  <line class="c-node" x1="600" y1="242" x2="590" y2="296"/>
  <line class="c-node" x1="590" y1="326" x2="590" y2="388"/>
  <rect x="438" y="210" width="56" height="20" rx="10" fill="#0D9488"/>
  <text class="fp" x="466" y="224" text-anchor="middle">NODE</text>

  <!-- PHB: GPU0 -> Switch A -> Host Bridge A -> Switch B -> GPU2 -->
  <line class="c-phb" x1="94" y1="388" x2="94" y2="326"/>
  <line class="c-phb" x1="110" y1="296" x2="150" y2="242"/>
  <line class="c-phb" x1="270" y1="242" x2="320" y2="296"/>
  <line class="c-phb" x1="320" y1="326" x2="320" y2="388"/>
  <rect x="188" y="250" width="44" height="20" rx="10" fill="#7C3AED"/>
  <text class="fp" x="210" y="264" text-anchor="middle">PHB</text>

  <!-- SYS: GPU0 -> Switch A -> Host Bridge A -> CPU0 -> CPU1 -> Host Bridge -> Switch D -> GPU4 -->
  <line class="c-sys" x1="60" y1="416" x2="70" y2="311"/>
  <line class="c-sys" x1="150" y1="296" x2="100" y2="224"/>
  <line class="c-sys" x1="210" y1="206" x2="300" y2="160"/>
  <line class="c-sys" x1="540" y1="140" x2="1000" y2="140"/>
  <line class="c-sys" x1="1280" y1="140" x2="1250" y2="224"/>
  <line class="c-sys" x1="1140" y1="242" x2="1140" y2="296"/>
  <line class="c-sys" x1="1070" y1="326" x2="1070" y2="388"/>
  <rect x="714" y="128" width="92" height="24" rx="12" fill="#DC2626"/>
  <text class="fp" x="760" y="144" text-anchor="middle">SYS (QPI/UPI)</text>

  <!-- NVLink: direct GPU path below the PCIe fabric -->
  <polyline class="c-nv" points="110,444 110,530 590,530 590,444"/>
  <polyline class="c-nv" points="240,444 240,510"/>
  <polyline class="c-nv" points="350,444 350,510"/>
  <rect x="306" y="538" width="72" height="22" rx="11" fill="#16A34A"/>
  <text class="fp" x="342" y="553" text-anchor="middle">NVLink</text>
  <text class="fm" x="342" y="572" text-anchor="middle">bypasses PCIe</text>

  <!-- ======================== LEGEND ======================== -->
  <line x1="40" y1="672" x2="1460" y2="672" stroke="#EAECF0" stroke-width="1"/>
  <text class="fs" x="60" y="704">Interconnect Speed</text>

  <line x1="60" y1="730" x2="100" y2="730" stroke="#16A34A" stroke-width="3.5" stroke-linecap="round"/>
  <text class="fleg" x="110" y="734">NV#</text>
  <text class="flegs" x="148" y="734">GPU direct</text>

  <line x1="280" y1="730" x2="320" y2="730" stroke="#0284C7" stroke-width="3" stroke-linecap="round"/>
  <text class="fleg" x="330" y="734">PIX</text>
  <text class="flegs" x="364" y="734">same switch</text>

  <line x1="500" y1="730" x2="540" y2="730" stroke="#EA580C" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 5"/>
  <text class="fleg" x="550" y="734">PXB</text>
  <text class="flegs" x="588" y="734">multi switch</text>

  <line x1="720" y1="730" x2="760" y2="730" stroke="#0D9488" stroke-width="3" stroke-linecap="round" stroke-dasharray="5 3"/>
  <text class="fleg" x="770" y="734">NODE</text>
  <text class="flegs" x="816" y="734">multi host bridge</text>

  <line x1="960" y1="730" x2="1000" y2="730" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" stroke-dasharray="7 4"/>
  <text class="fleg" x="1010" y="734">PHB</text>
  <text class="flegs" x="1048" y="734">via host bridge</text>

  <line x1="1200" y1="730" x2="1240" y2="730" stroke="#DC2626" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 6"/>
  <text class="fleg" x="1250" y="734">SYS</text>
  <text class="flegs" x="1284" y="734">cross NUMA</text>

  <text class="flegs" x="750" y="774" text-anchor="middle">speed: NV# > PIX > PXB > NODE > PHB > SYS</text>

</svg>
